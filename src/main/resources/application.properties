spring.application.name=incident_Root_Cause_Analyzer

//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
spring:
application:
name: incident-root-cause-analyzer

datasource:
url: jdbc:postgresql://localhost:5432/incidents_db
username: postgres
password: postgres
driver-class-name: org.postgresql.Driver

jpa:
hibernate:
ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
show-sql: false
properties:
dialect: org.hibernate.dialect.PostgreSQLDialect
format_sql: true

flyway:
enabled: true
baseline-on-migrate: true
locations: classpath:db/migration

# Spring AI ? OpenAI
ai:
openai:
api-key: ${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}            
chat:
options:
model: gpt-4o                     # best for reasoning chains
max-tokens: 2048
# Phase 2: pgvector store config
vectorstore:
pgvector:
index-type: hnsw
distance-type: cosine_distance
dimensions: 1536

springdoc:
api-docs:
path: /v3/api-docs
swagger-ui:
tags-sorter: alpha

management:
endpoints:
web:
exposure:
include: health, info, metrics
endpoint:
health:
show-details: always

logging:
level:
com.example.incident: DEBUG
org.springframework.ai: INFO